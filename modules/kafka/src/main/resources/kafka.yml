spring:
  kafka:
    bootstrap-servers: ${BOOTSTRAP_SERVERS}
    client-id: ${spring.application.name}
    properties:
        spring.json.add.type.headers: false # json serialize off
        request.timeout.ms: 20000
        retry.backoff.ms: 500
        auto:
          create.topics.enable: false
          register.schemas: false
          offset.reset: latest
        use.latest.version: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # [fix] Outbox payload는 이미 JSON 문자열인데 JsonSerializer가 한 번 더 직렬화(이중 인코딩)해
      #       Consumer의 readTree가 객체가 아닌 TextNode로 파싱돼 NPE 발생 → StringSerializer로 대칭(String↔String) 정렬
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
    consumer:
      group-id: loopers-default-consumer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        enable-auto-commit: false
    listener:
      ack-mode: manual

---
spring.config.activate.on-profile: local, test

spring:
  kafka:
    bootstrap-servers: localhost:9092

---
spring.config.activate.on-profile: dev

---
spring.config.activate.on-profile: qa

---
spring.config.activate.on-profile: prd
